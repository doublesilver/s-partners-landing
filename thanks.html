<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상담 신청 완료 | 에스(S)파트너스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Serif+KR:wght@600;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --orange-700: #b75410;
      --orange-500: #f57a1f;
      --text: #241d18;
      --muted: #6b594d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(245, 122, 31, 0.18), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(245, 122, 31, 0.12), transparent 22%),
        linear-gradient(180deg, #f8f0e7 0%, #f4ece4 100%);
    }

    .thanks-card {
      width: min(720px, 100%);
      padding: 44px;
      border-radius: 34px;
      background: rgba(255, 250, 245, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 28px 70px rgba(48, 32, 18, 0.12);
      text-align: center;
    }

    .thanks-badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff7f0;
      background: linear-gradient(135deg, var(--orange-700), var(--orange-500));
      box-shadow: 0 16px 32px rgba(183, 84, 16, 0.22);
    }

    .thanks-title {
      margin: 0 0 14px;
      font-family: "Noto Serif KR", serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: -0.04em;
    }

    .thanks-copy {
      margin: 0 auto;
      max-width: 36ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .thanks-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 54px;
      padding: 0 22px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      text-decoration: none;
    }

    .btn-primary {
      color: #fff7f0;
      background: linear-gradient(135deg, var(--orange-700), var(--orange-500));
      box-shadow: 0 16px 28px rgba(183, 84, 16, 0.2);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(36, 29, 24, 0.1);
    }
  </style>
</head>
<body>
  <section class="thanks-card">
    <div class="thanks-badge">S</div>
    <h1 class="thanks-title">신청완료되셨습니다</h1>
    <p class="thanks-copy">
      접수된 내용을 순차적으로 확인 후 연락드리겠습니다.
      사업장 상황과 접수량에 따라 검토 시간이 달라질 수 있습니다.
    </p>
    <div class="thanks-actions">
      <a class="btn btn-primary" href="index.html">메인으로 돌아가기</a>
      <a class="btn btn-secondary" href="index.html#apply">다시 신청 확인하기</a>
    </div>
  </section>
</body>
</html>
